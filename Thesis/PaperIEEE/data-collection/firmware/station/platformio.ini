;*************************************************************
; BLE Indoor Localization — Station (ESP-IDF)
; Board: ESP32-S3 (LilyGo T-SIMCAM or generic ESP32-S3)
; 4 stations: S1, S2, S3, S4
; Flash with: pio run -e station_s1 -t upload  (change sX as needed)
;*************************************************************

[platformio]
default_envs = station_s1
; ESP-IDF project structure: sources live in main/ not src/
src_dir = main

; ── Shared settings ─────────────────────────────────────────────────
[env:base]
platform = espressif32@6.3.2
board = esp32s3box
framework = espidf
monitor_speed = 115200
upload_speed = 921600
build_flags =
    -DCONFIG_BT_ENABLED=1
    -DCONFIG_BTDM_CTRL_MODE_BLE_ONLY=1
    -DWIFI_SSID=\"KNIGHT\"
    -DWIFI_PASS=\"192837abcd\"
    -DMQTT_BROKER_URI=\"mqtt://192.168.137.1:1883\"
    -DTARGET_TAG_NAME=\"WS_TAG\"
board_build.partitions = partitions.csv
board_build.cmake_extra_args = 
    -DSDKCONFIG_DEFAULTS="sdkconfig.defaults"

; ── S1 ──────────────────────────────────────────────────────────────
[env:station_s1]
extends = env:base
build_flags =
    ${env:base.build_flags}
    -DSTATION_ID=\"S1\"

; ── S2 ──────────────────────────────────────────────────────────────
[env:station_s2]
extends = env:base
build_flags =
    ${env:base.build_flags}
    -DSTATION_ID=\"S2\"

; ── S3 ──────────────────────────────────────────────────────────────
[env:station_s3]
extends = env:base
build_flags =
    ${env:base.build_flags}
    -DSTATION_ID=\"S3\"

; ── S4 ──────────────────────────────────────────────────────────────
[env:station_s4]
extends = env:base
build_flags =
    ${env:base.build_flags}
    -DSTATION_ID=\"S4\"

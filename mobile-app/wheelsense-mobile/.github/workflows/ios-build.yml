name: Build iOS APK (Local-like on GitHub)
on:
  workflow_dispatch: # กด Build เองได้จากหน้า GitHub

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: ?? Checkout repository
        uses: actions/checkout@v4

      - name: ?? Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: ?? Install EAS CLI
        run: npm install -g eas-cli

      - name: ?? Install dependencies
        run: npm install

      - name: ?? Fix Node Resolution (Patch)
        run: |
          # ใช้สคริปต์เดียวกับที่เราแก้ในเครื่อง
          sed -i '' "s/require.resolve('expo-modules-autolinking\/package.json', { paths: \[require.resolve('expo\/package.json')\] })/require('path').dirname(require.resolve('expo\/package.json'))/g" node_modules/expo-modules-autolinking/android/expo-gradle-plugin/expo-autolinking-settings-plugin/src/main/kotlin/expo/modules/plugin/ExpoAutolinkingSettingsPlugin.kt || true

      - name: ?? Build iOS
        run: |
          # ใช้คำสั่ง build แบบไม่ใช้ cloud (แต่รันบนเครื่อง Mac ของ GitHub)
          # หมายเหตุ: ขั้นตอนนี้จะติดเรื่อง Credentials ถ้าไม่เคยตั้งค่าไว้
          eas build --platform ios --local --non-interactive --profile preview
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: ?? Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: ./*.ipa

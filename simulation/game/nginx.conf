events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Godot HTML5 export requires specific MIME type for .pck
    types {
        application/octet-stream pck;
    }

    sendfile        on;
    keepalive_timeout  65;

    # Resolver for dynamic DNS (Docker internal DNS)
    resolver 127.0.0.11 valid=30s ipv6=off;

    server {
        listen       80;
        server_name  localhost;

        location / {
            root   /usr/share/nginx/html;
            index  index.html;
            
            # Enable gzip for text files
            gzip on;
            gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
            
            # Cache static assets
            location ~* \.(wasm|pck)$ {
                add_header Cache-Control "public, max-age=31536000, immutable";
            }
        }

        # Set backend URL variable (use host.docker.internal for Docker Desktop compatibility)
        set $backend_host "host.docker.internal:8000";

        # Proxy API requests to backend
        location /api/sim/game/token {
            proxy_pass http://$backend_host/api/sim/game/token;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy WebSocket connections to backend
        location /api/sim/game/ws {
            proxy_pass http://$backend_host/api/sim/game/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }

        # Error pages
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}

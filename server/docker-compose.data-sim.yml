# Simulator-mode Postgres (pgdata_sim) + synthetic MQTT worker. Merged with docker-compose.core.yml via docker-compose.sim.yml.

services:
  wheelsense-db-sim:
    container_name: wheelsense-db-sim
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: wheelsense_sim
      POSTGRES_USER: wheelsense
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata_sim:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wheelsense -d wheelsense_sim"]
      interval: 5s
      timeout: 5s
      retries: 5

  # DB-specific environment overrides (merged with core service definition)
  wheelsense-platform-server:
    depends_on:
      wheelsense-db-sim:
        condition: service_healthy
    environment:
      ENV_MODE: simulator
      DATABASE_URL: postgresql+asyncpg://wheelsense:${POSTGRES_PASSWORD}@wheelsense-db-sim:5432/wheelsense_sim
      DATABASE_URL_SYNC: postgresql://wheelsense:${POSTGRES_PASSWORD}@wheelsense-db-sim:5432/wheelsense_sim
      BOOTSTRAP_DEMO_WORKSPACE_NAME: ${BOOTSTRAP_DEMO_WORKSPACE_NAME:-WheelSense Simulation}

  wheelsense-agent-runtime:
    environment:
      DATABASE_URL: postgresql+asyncpg://wheelsense:${POSTGRES_PASSWORD}@wheelsense-db-sim:5432/wheelsense_sim
      DATABASE_URL_SYNC: postgresql://wheelsense:${POSTGRES_PASSWORD}@wheelsense-db-sim:5432/wheelsense_sim

  # Simulator worker (unique to sim mode)
  wheelsense-simulator:
    build:
      context: .
      dockerfile: Dockerfile
    image: wheelsense-platform-wheelsense-platform-server
    restart: unless-stopped
    depends_on:
      wheelsense-db-sim:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
      wheelsense-platform-server:
        condition: service_started
    environment:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: postgresql+asyncpg://wheelsense:${POSTGRES_PASSWORD}@wheelsense-db-sim:5432/wheelsense_sim
      DATABASE_URL_SYNC: postgresql://wheelsense:${POSTGRES_PASSWORD}@wheelsense-db-sim:5432/wheelsense_sim
      MQTT_BROKER: ${MQTT_BROKER:-mosquitto}
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_USER: ${MQTT_USER:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
      API_BASE_URL: http://wheelsense-platform-server:8000/api
      BOOTSTRAP_DEMO_WORKSPACE_NAME: ${BOOTSTRAP_DEMO_WORKSPACE_NAME:-WheelSense Simulation}
      SIM_WORKSPACE_ID: ${SIM_WORKSPACE_ID:-}
      SIM_ENABLE_ALERTS: ${SIM_ENABLE_ALERTS:-false}
      # Set to 1 to force scripts/seed_sim_team.py to re-run when the workspace already has devices/patients.
      SIM_FORCE_SEED: ${SIM_FORCE_SEED:-}
    command:
      - sh
      - -c
      - python -m app.sim.runtime.sim_game_seed --workspace "${BOOTSTRAP_DEMO_WORKSPACE_NAME:-WheelSense Simulation}" && exec python -m app.sim.runtime.sim_controller --routine

volumes:
  pgdata_sim:

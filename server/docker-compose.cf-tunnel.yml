# Cloudflare quick tunnel → Next.js (`wheelsense-platform-web:3000`) + MQTT publish of `portal_base_url`
# to `WheelSense/config/all`.
#
# **Production (`docker-compose.yml`):** this file is included automatically — `cf-tunnel-publish` starts on every
# `docker compose up` (no extra flags).
#
# **Simulator:** not included in `docker-compose.sim.yml`. From `server/` run:
#   docker compose -f docker-compose.sim.yml -f docker-compose.cf-tunnel.yml up -d --build
#
# ARM64: `docker compose build --build-arg TARGETARCH=arm64 cf-tunnel-publish`

services:
  cf-tunnel-publish:
    build:
      context: .
      dockerfile: docker/cf-tunnel-publish/Dockerfile
    restart: unless-stopped
    environment:
      TUNNEL_TARGET_URL: ${CF_TUNNEL_TARGET_URL:-http://wheelsense-platform-web:3000}
      MQTT_BROKER: ${MQTT_BROKER:-mosquitto}
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_USER: ${MQTT_USER:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
    depends_on:
      wheelsense-platform-web:
        condition: service_started
      mosquitto:
        condition: service_healthy

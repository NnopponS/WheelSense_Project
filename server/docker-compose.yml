# Production DB mode: merges shared stack + Postgres (pgdata-prod).
# Mock/sim: use docker-compose.sim.yml (or: docker compose -f docker-compose.core.yml -f docker-compose.data-mock.yml up -d).
# Requires Docker Compose v2 with `include` (Docker Desktop 4.24+ / Compose 2.20+).

name: wheelsense-platform

include:
  - path: docker-compose.core.yml
  - path: docker-compose.data-prod.yml

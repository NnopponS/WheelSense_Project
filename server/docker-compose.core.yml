# Shared application stack (Mosquitto, Web UI, optional services). Combine with exactly one of:
#   docker-compose.data-prod.yml  OR  docker-compose.data-sim.yml
# Entry points: docker-compose.yml (prod DB) or docker-compose.sim.yml (sim DB).

services:
  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "localhost", "-t", "health", "-m", "ok", "-q", "0"]
      interval: 10s
      timeout: 5s
      retries: 3

  wheelsense-platform-server:
    container_name: wheelsense-platform-server
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      MQTT_BROKER: ${MQTT_BROKER:-mosquitto}
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_USER: ${MQTT_USER:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
      AI_PROVIDER: ${AI_PROVIDER:-ollama}
      AI_DEFAULT_MODEL: ${AI_DEFAULT_MODEL:-gemma4:e4b}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
      COPILOT_CLI_URL: ${COPILOT_CLI_URL:-copilot-cli:4321}
      COPILOT_GITHUB_TOKEN: ${COPILOT_GITHUB_TOKEN:-}
      INTENT_SEMANTIC_ENABLED: ${INTENT_SEMANTIC_ENABLED:-false}
      INTENT_LLM_NORMALIZE_ENABLED: ${INTENT_LLM_NORMALIZE_ENABLED:-false}
      PORTAL_BASE_URL: ${PORTAL_BASE_URL:-}
      GITHUB_OAUTH_CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID:-}
      PROFILE_IMAGE_STORAGE_DIR: /app/storage/profile_images
    volumes:
      - profile_images:/app/storage/profile_images
    depends_on:
      mosquitto:
        condition: service_healthy

  wheelsense-agent-runtime:
    container_name: wheelsense-agent-runtime
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["uvicorn", "app.agent_runtime.main:app", "--host", "0.0.0.0", "--port", "8010"]
    ports:
      - "8010:8010"
    environment:
      SECRET_KEY: ${SECRET_KEY}
      SERVER_BASE_URL: ${SERVER_BASE_URL:-http://wheelsense-platform-server:8000}
      AGENT_RUNTIME_MCP_TOOL_TRANSPORT: ${AGENT_RUNTIME_MCP_TOOL_TRANSPORT:-http}
      MCP_STREAMABLE_HTTP_URL: ${MCP_STREAMABLE_HTTP_URL:-http://wheelsense-platform-server:8000/mcp/mcp}
      AGENT_RUNTIME_URL: ${AGENT_RUNTIME_URL:-http://wheelsense-agent-runtime:8010}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      AI_PROVIDER: ${AI_PROVIDER:-ollama}
      AI_DEFAULT_MODEL: ${AI_DEFAULT_MODEL:-gemma4:e4b}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
      COPILOT_CLI_URL: ${COPILOT_CLI_URL:-copilot-cli:4321}
      COPILOT_GITHUB_TOKEN: ${COPILOT_GITHUB_TOKEN:-}
      INTENT_SEMANTIC_ENABLED: ${INTENT_SEMANTIC_ENABLED:-false}
      INTENT_LLM_NORMALIZE_ENABLED: ${INTENT_LLM_NORMALIZE_ENABLED:-false}
      AGENT_ROUTING_MODE: ${AGENT_ROUTING_MODE:-intent}
      AGENT_LLM_ROUTER_MODEL: ${AGENT_LLM_ROUTER_MODEL:-}
    depends_on:
      wheelsense-platform-server:
        condition: service_started

  wheelsense-platform-web:
    container_name: wheelsense-platform-web
    build:
      context: ../frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      WHEELSENSE_API_ORIGIN: http://wheelsense-platform-server:8000
    depends_on:
      wheelsense-platform-server:
        condition: service_started
    develop:
      watch:
        - action: rebuild
          path: ../frontend
          ignore:
            - node_modules/
            - .next/
            - "**/.git/"

  copilot-cli:
    profiles:
      - copilot
    image: ghcr.io/github/copilot-cli:latest
    restart: unless-stopped
    command: ["--headless", "--port", "4321"]
    ports:
      - "4321:4321"
    environment:
      - COPILOT_GITHUB_TOKEN=${COPILOT_GITHUB_TOKEN:-}
    volumes:
      - copilot_sessions:/root/.copilot/session-state

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    restart: unless-stopped
    ports:
      - "8123:8123"
    volumes:
      - ./homeassistant:/config
    environment:
      - TZ=Asia/Bangkok
    network_mode: bridge

volumes:
  mosquitto_data:
  mosquitto_log:
  ollama_data:
  copilot_sessions:
  profile_images:

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WheelSense Detection Simulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 2rem;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 2rem;
            color: #00d4ff;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin-bottom: 2rem;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ef4444;
        }

        .status-dot.connected {
            background: #22c55e;
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.5);
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card h2 {
            margin-bottom: 1rem;
            color: #00d4ff;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #a0aec0;
        }

        select,
        input {
            width: 100%;
            padding: 0.75rem;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 1rem;
        }

        select:focus,
        input:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.2);
        }

        .room-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        .room-btn {
            padding: 1.5rem;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.2);
            color: #fff;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .room-btn:hover {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.1);
            transform: translateY(-2px);
        }

        .room-btn.active {
            border-color: #22c55e;
            background: rgba(34, 197, 94, 0.2);
        }

        .room-btn .emoji {
            font-size: 2rem;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: #fff;
        }

        .log-container {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            padding: 1rem;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Consolas', monospace;
            font-size: 0.85rem;
        }

        .log-entry {
            padding: 0.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .log-entry.sent {
            color: #22c55e;
        }

        .log-entry.received {
            color: #00d4ff;
        }

        .log-entry.error {
            color: #ef4444;
        }

        .log-entry .time {
            color: #a0aec0;
            margin-right: 0.5rem;
        }

        .current-position {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            padding: 1.5rem;
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.2), rgba(0, 212, 255, 0.2));
            border-radius: 12px;
            margin-bottom: 1rem;
        }

        .position-label {
            font-size: 1.2rem;
            color: #a0aec0;
        }

        .position-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #22c55e;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🦽 WheelSense Detection Simulator</h1>

        <div class="status-bar">
            <div class="status-indicator">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Not Connected</span>
            </div>
            <div>
                <button class="btn btn-primary" onclick="connect()">Connect</button>
                <button class="btn btn-danger" onclick="disconnect()">Disconnect</button>
            </div>
        </div>

        <div class="card">
            <h2>📍 Current Location</h2>
            <div class="current-position">
                <span class="position-label">Wheelchair Location:</span>
                <span class="position-value" id="currentRoom">-</span>
            </div>
        </div>

        <div class="card">
            <h2>🔄 Simulate Wheelchair Detection</h2>
            <p style="color: #a0aec0; margin-bottom: 1rem;">Click to select the room to simulate wheelchair detection</p>

            <div class="form-group">
                <label>Wheelchair ID:</label>
                <select id="wheelchairId">
                    <option value="WC001">WC001 - Wheelchair 1</option>
                    <option value="WC002">WC002 - Wheelchair 2</option>
                </select>
            </div>

            <div class="room-buttons">
                <button class="room-btn" onclick="simulateDetection('livingroom')">
                    <span class="emoji">🛋️</span>
                    <span>Living Room</span>
                    <span style="font-size: 0.8rem; color: #a0aec0">livingroom</span>
                </button>
                <button class="room-btn" onclick="simulateDetection('bedroom')">
                    <span class="emoji">🛏️</span>
                    <span>Bedroom</span>
                    <span style="font-size: 0.8rem; color: #a0aec0">bedroom</span>
                </button>
                <button class="room-btn" onclick="simulateDetection('kitchen')">
                    <span class="emoji">🍳</span>
                    <span>Kitchen</span>
                    <span style="font-size: 0.8rem; color: #a0aec0">kitchen</span>
                </button>
                <button class="room-btn" onclick="simulateDetection('bathroom')">
                    <span class="emoji">🚿</span>
                    <span>Bathroom</span>
                    <span style="font-size: 0.8rem; color: #a0aec0">bathroom</span>
                </button>
            </div>
        </div>

        <div class="card">
            <h2>📝 Log</h2>
            <div class="log-container" id="logContainer">
                <div class="log-entry">System starting...</div>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let currentRoom = null;

        function log(message, type = 'info') {
            const container = document.getElementById('logContainer');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const time = new Date().toLocaleTimeString('en-US');
            entry.innerHTML = `<span class="time">[${time}]</span> ${message}`;
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
        }

        function updateStatus(connected) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            if (connected) {
                dot.classList.add('connected');
                text.textContent = 'Connected';
            } else {
                dot.classList.remove('connected');
                text.textContent = 'Not Connected';
            }
        }

        function updateCurrentRoom(room) {
            currentRoom = room;
            const roomEl = document.getElementById('currentRoom');
            const roomNames = {
                'livingroom': '🛋️ Living Room',
                'bedroom': '🛏️ Bedroom',
                'kitchen': '🍳 Kitchen',
                'bathroom': '🚿 Bathroom'
            };
            roomEl.textContent = roomNames[room] || room;

            // Update button states
            document.querySelectorAll('.room-btn').forEach(btn => {
                btn.classList.remove('active');
            });
        }

        function connect() {
            if (ws) {
                ws.close();
            }

            // Connect to backend WebSocket directly (port 8000)
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//localhost:8000/ws`;

            log(`Connecting... ${wsUrl}`);

            try {
                ws = new WebSocket(wsUrl);

                ws.onopen = () => {
                    log('✅ WebSocket connected successfully!', 'sent');
                    updateStatus(true);
                };

                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        log(`📥 Received: ${data.type}`, 'received');

                        if (data.type === 'wheelchair_detection') {
                            updateCurrentRoom(data.room);
                            log(`🦽 Detection: wheelchair in ${data.room} (detected: ${data.detected})`, 'received');
                        }
                    } catch (e) {
                        // Binary data or non-JSON
                    }
                };

                ws.onerror = (error) => {
                    log('❌ WebSocket error', 'error');
                    console.error(error);
                };

                ws.onclose = () => {
                    log('🔌 Connection closed', 'error');
                    updateStatus(false);
                };

            } catch (e) {
                log(`❌ Unable to connect: ${e.message}`, 'error');
            }
        }

        function disconnect() {
            if (ws) {
                ws.close();
                ws = null;
            }
            updateStatus(false);
            log('🔌 Disconnected');
        }

        function simulateDetection(room) {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                log('❌ WebSocket not connected', 'error');
                return;
            }

            const wheelchairId = document.getElementById('wheelchairId').value;

            // Random bbox for simulation
            const bboxX = Math.floor(Math.random() * 200) + 100;
            const bboxY = Math.floor(Math.random() * 150) + 100;
            const bboxW = 80 + Math.floor(Math.random() * 40);
            const bboxH = 100 + Math.floor(Math.random() * 40);

            const detection = {
                type: 'wheelchair_detection',
                room: room,
                device_id: `CAM_${room.toUpperCase()}`,
                wheelchair_id: wheelchairId,
                detected: true,
                confidence: 0.85 + Math.random() * 0.14,
                bbox: [bboxX, bboxY, bboxX + bboxW, bboxY + bboxH],
                frame_size: [640, 480],
                timestamp: new Date().toISOString()
            };

            ws.send(JSON.stringify(detection));
            log(`📤 Sent Detection: ${wheelchairId} to ${room}`, 'sent');

            // Update UI
            updateCurrentRoom(room);

            // Highlight button
            document.querySelectorAll('.room-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.closest('.room-btn').classList.add('active');
        }

        // Auto-connect on load
        window.onload = () => {
            log('🚀 Ready - Click "Connect" button to start');
        };
    </script>
</body>

</html>

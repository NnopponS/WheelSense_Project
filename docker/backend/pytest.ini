[pytest]
# Pytest configuration for WheelSense backend tests

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -p no:warnings

# Markers
markers =
    smoke: Fast smoke tests that must pass on every run
    integration: Service-to-service integration tests
    e2e: End-to-end user journey tests
    reliability: Failure scenario and recovery tests
    slow: Tests that take longer to run

# Async configuration
asyncio_mode = auto

# Coverage (if pytest-cov is installed)
# --cov=src
# --cov-report=html
# --cov-report=term-missing


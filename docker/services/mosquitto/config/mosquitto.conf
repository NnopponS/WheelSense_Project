# Mosquitto MQTT Broker Configuration
# WheelSense MockUp System

# ===========================================
# Network Configuration
# ===========================================
listener 1883
protocol mqtt

# WebSocket listener for web clients
listener 9001
protocol websockets

# ===========================================
# Security Configuration
# ===========================================
# Allow anonymous connections (for development)
# For production, set to false and configure authentication
allow_anonymous true

# For production, uncomment and configure:
# password_file /mosquitto/config/passwd
# allow_anonymous false

# ===========================================
# Persistence Configuration
# ===========================================
persistence true
persistence_location /mosquitto/data/

# ===========================================
# Logging Configuration
# ===========================================
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true

# ===========================================
# Message Settings
# ===========================================
# Maximum message size (5MB for video frames)
message_size_limit 5242880

# Maximum in-flight QoS 1 and 2 messages
max_inflight_messages 100

# Maximum queued messages per client
max_queued_messages 1000

# ===========================================
# Connection Settings
# ===========================================
# Keep alive timeout
max_keepalive 120

# Connection timeout
connection_messages true




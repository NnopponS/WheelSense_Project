# WheelSense MockUp - Docker Compose Configuration
# Smart home system for wheelchair users
# Includes Backend, MCP Server, Ollama Local LLM, Dashboard

services:
  # ==================== MQTT Broker (Local) ====================
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: wheelsense-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883" # MQTT - for TsimCam devices
      - "9001:9001" # WebSocket - for Dashboard
    volumes:
      - ./services/mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      wheelsense-network:
        ipv4_address: 172.28.0.10
    healthcheck:
      test: [ "CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ==================== MongoDB ====================
  mongodb:
    image: mongo:7.0
    container_name: wheelsense-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: wheelsense123
      MONGO_INITDB_DATABASE: wheelsense
    volumes:
      - mongodb_data:/data/db
      - ./services/mongodb/init:/docker-entrypoint-initdb.d:ro
    networks:
      wheelsense-network:
        ipv4_address: 172.28.0.11
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/wheelsense --quiet
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ==================== Ollama (Local LLM) ====================
  ollama:
    image: ollama/ollama:latest
    container_name: wheelsense-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      wheelsense-network:
        ipv4_address: 172.28.0.12
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    # For machines without GPU, use docker-compose.cpu.yml
    healthcheck:
      test: [ "CMD", "ollama", "list" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ==================== Backend API (now part of MCP Server) ====================
  # Backend functionality is now in backend service
  # Backend handles REST API endpoints

  # ==================== Backend (Main Server) ====================
  # Handles REST API endpoints
  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: wheelsense-backend
    restart: unless-stopped
    ports:
      - "8000:8000" # Backend REST API
      - "8765:8765" # WebSocket for ESP32 cameras
      - "5555:5555/udp" # UDP Discovery for auto-discovery
    environment:
      - MONGO_URI=mongodb://admin:wheelsense123@mongodb:27017/wheelsense?authSource=admin
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=qwen2.5:7b
      - ENVIRONMENT=production
      - DEBUG=false
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      # Pass host IP for UDP discovery response (optional - auto-detected if not set)
      # Set HOST_IP only if you need to override auto-detection
      - HOST_IP=${HOST_IP:-}
    command: python -m uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      mongodb:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
      ollama:
        condition: service_started
    volumes:
      - ./backend/src:/app/src
    networks:
      wheelsense-network:
        ipv4_address: 172.28.0.20
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ==================== Camera Service (Wheelchair Detection) ====================
  camera-service:
    build:
      context: ./services/camera-service
      dockerfile: Dockerfile
    container_name: wheelsense-camera-service
    restart: unless-stopped
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - MQTT_TOPIC_VIDEO=WheelSenseMockup/video
      - MQTT_TOPIC_DETECTION=WheelSenseMockup/detection
      - MQTT_TOPIC_CONTROL=WheelSenseMockup/control
      - MQTT_TOPIC_STATUS=WheelSenseMockup/status
      - DEVICE_ID=TSIM_004
      - DETECTION_METHOD=yolo
      - DETECTION_CONFIDENCE_THRESHOLD=0.5
      - DETECTION_INTERVAL_SEC=0.1
      # Preview Mode (set to true to enable OpenCV preview window for debugging)
      - ENABLE_PREVIEW=false
      # GPU settings
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0
    volumes:
      # Mount models directory so we can update model files without rebuilding image
      - ./services/camera-service/models:/app/models:ro
      # Mount source code for hot-reload without rebuild (just restart container)
      - ./services/camera-service/src:/app/src:ro
    depends_on:
      mosquitto:
        condition: service_healthy
    networks:
      wheelsense-network:
        ipv4_address: 172.28.0.22
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]

  # ==================== Dashboard (Frontend) ====================
  dashboard:
    build:
      context: ./services/dashboard
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
        - VITE_MCP_URL=/mcp
        - VITE_MQTT_WS_URL=ws://localhost/mqtt
    container_name: wheelsense-dashboard
    restart: unless-stopped
    # Dashboard is accessed through nginx proxy, no direct port mapping needed
    # ports:
    #   - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      wheelsense-network:
        ipv4_address: 172.28.0.30

  # ==================== Detection Test Page ====================
  detection-test:
    build:
      context: ./services/detection-test
      dockerfile: Dockerfile
    container_name: wheelsense-detection-test
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      wheelsense-network:
        ipv4_address: 172.28.0.31

  # ==================== Nginx Reverse Proxy ====================
  nginx:
    image: nginx:alpine
    container_name: wheelsense-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "3000:80" # Also listen on port 3000 for backward compatibility
    volumes:
      - ./services/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./services/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - dashboard
      - backend
      - detection-test
    networks:
      wheelsense-network:
        ipv4_address: 172.28.0.2

networks:
  wheelsense-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  mongodb_data:
    driver: local
  mosquitto_data:
    driver: local
  mosquitto_log:
    driver: local
  ollama_data:
    driver: local

;*************************************************************
; WheelSense M5StickC Gateway
; - BLE Scanner (NimBLE)
; - WiFiManager for WiFi configuration
; - MQTT Publisher
; - IMU Processing for wheelchair movement
;*************************************************************

[env:m5stick-c]
platform = espressif32
board = m5stick-c
framework = arduino

lib_deps = 
    m5stack/M5StickC@^0.2.5
    bblanchon/ArduinoJson@^6.21.3
    knolleary/PubSubClient@^2.8
    tzapu/WiFiManager@^2.0.16-rc.2
    h2zero/NimBLE-Arduino@^1.4.1

monitor_speed = 115200
upload_speed = 1500000

build_flags = 
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_M5STICK_C
    -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=1
    -DCONFIG_NIMBLE_CPP_LOG_LEVEL=2
    -Os  ; Optimize for size (important for M5StickC)

; Optimize for size and stability
board_build.partitions = min_spiffs.csv
board_build.filesystem = littlefs

; Arduino framework options
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio


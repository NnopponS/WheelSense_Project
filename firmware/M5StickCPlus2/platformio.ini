; PlatformIO Project Configuration for WheelSense M5StickCPlus2 Gateway
; RSSI Fingerprint + IMU Data Collection

[env:m5stick-c-plus2]
platform = espressif32
board = m5stick-c-plus
framework = arduino
monitor_speed = 115200

lib_deps = 
    m5stack/M5StickCPlus2
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^6.21.0

build_flags = 
    -DCORE_DEBUG_LEVEL=1
    -DARDUINO_USB_MODE=1

; WiFi and MQTT settings (override in secrets.h)
; #define WIFI_SSID "your_ssid"
; #define WIFI_PASSWORD "your_password"
; #define MQTT_BROKER "your_broker"

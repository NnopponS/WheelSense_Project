; PlatformIO Project Configuration for WheelSense M5StickCPlus2 Gateway
; RSSI Fingerprint + IMU Data Collection

[env:m5stick-c-plus2]
platform = espressif32 @ ^6.5.0
board = m5stick-c
framework = arduino
monitor_speed = 115200

board_build.partitions = huge_app.csv
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_MODE=1

lib_deps =
    m5stack/M5StickCPlus2
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^6.21.0

lib_ignore =
    DFRobot_GP8XXX

; PlatformIO Project Configuration for WheelSense ESP32-S3 BLE Beacon Node

[env:esp32-s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

lib_deps = 

build_flags = 
    -DCORE_DEBUG_LEVEL=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; Set NODE_ID in the code before flashing
; Each node should have a unique ID (1, 2, 3, etc.)

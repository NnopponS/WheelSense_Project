name: wheelsense

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=wheelsense
      - POSTGRES_PASSWORD=wheelsense
      - POSTGRES_DB=wheelsense
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U wheelsense" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - wheelsense

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=30m
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    gpus: all
    healthcheck:
      test: [ "CMD", "ollama", "list" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - wheelsense

  backend:
    build:
      context: ../backend
      no_cache: true
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://wheelsense:wheelsense@postgres:5432/wheelsense
      - MQTT_BROKER=broker.emqx.io
      - MQTT_PORT=1883
      - MQTT_TOPIC=WheelSense/data
      - MQTT_USER=
      - MQTT_PASSWORD=
      - DEVICE_BACKEND_URL=${DEVICE_BACKEND_URL:-}
      - DEVICE_SERVER_IP=${DEVICE_SERVER_IP:-}
      - HA_URL=http://homeassistant:8123
      - HA_TOKEN=${HA_TOKEN:-}
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=qwen2.5:7b
      - OLLAMA_REQUEST_TIMEOUT_SECONDS=${OLLAMA_REQUEST_TIMEOUT_SECONDS:-120}
      - OLLAMA_TEMPERATURE=${OLLAMA_TEMPERATURE:-0.3}
      - OLLAMA_TOP_P=${OLLAMA_TOP_P:-0.9}
      - OLLAMA_NUM_CTX=${OLLAMA_NUM_CTX:-2048}
      - OLLAMA_NUM_PREDICT=${OLLAMA_NUM_PREDICT:-256}
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-30m}
      - OLLAMA_RETRY_ATTEMPTS=${OLLAMA_RETRY_ATTEMPTS:-2}
      - OLLAMA_RETRY_BACKOFF_SECONDS=${OLLAMA_RETRY_BACKOFF_SECONDS:-1.5}
      - CHAT_MAX_USER_MESSAGE_CHARS=${CHAT_MAX_USER_MESSAGE_CHARS:-2000}
      - LLM_MAX_CONTEXT_CHARS=${LLM_MAX_CONTEXT_CHARS:-12000}
      - LLM_WARMUP_ON_STARTUP=${LLM_WARMUP_ON_STARTUP:-true}
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
      homeassistant:
        condition: service_started
    restart: unless-stopped
    networks:
      - wheelsense

    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')" ]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    build:
      context: ../frontend
      no_cache: true
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - wheelsense

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped
    networks:
      - wheelsense

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    ports:
      - "8123:8123"
    volumes:
      - ./homeassistant:/config
    environment:
      - TZ=Asia/Bangkok
    privileged: true
    restart: unless-stopped
    networks:
      - wheelsense

volumes:
  postgres_data:
  ollama_data:
    external: true
    name: docker_ollama_data
  mosquitto_data:
  mosquitto_log:


networks:
  wheelsense:
    driver: bridge

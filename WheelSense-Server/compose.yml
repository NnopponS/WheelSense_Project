services:
  mosquitto:
    image: eclipse-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mqtt_broker/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mqtt_broker/:/etc/mosquitto/

  postgres:
    image: postgres:16
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=wheeluser
      - POSTGRES_PASSWORD=wheelpass
      - POSTGRES_DB=iot_log
    volumes:
      - ./sql_db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wheeluser -d iot_log"]
      interval: 10s
      timeout: 5s
      retries: 5

  mqtt_collector:
    build: ./mqtt_collector
    ports:
      - "5000:5000"
    environment:
      - POSTGRES_URL=postgresql://wheeluser:wheelpass@postgres:5432/iot_log
      - SQL_TABLE=sensor_data
      - MQTT_BROKER=mqtt://mosquitto:1883
      - MQTT_TOPIC=WheelSense/data
      - PG_NOTIFY_CHANNEL=sensor_update
    depends_on:
      mosquitto:
        condition: service_started
      postgres:
        condition: service_healthy

  rest_api:
    build: ./rest_api
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - POSTGRES_URL=postgresql://wheeluser:wheelpass@postgres:5432/iot_log
      - SQL_TABLE=sensor_data
      - LABELS_TABLE=device_labels
      - PG_NOTIFY_CHANNEL=sensor_update
    depends_on:
      postgres:
        condition: service_healthy

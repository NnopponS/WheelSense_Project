; PlatformIO Project Configuration File for ESP8266 Appliance Controller
; nodemcuBase ver1.0
;
; ควบคุมอุปกรณ์ไฟฟ้าทั้งบ้าน (ไฟ, แอร์, พัดลม, ทีวี)

[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = 115200
upload_speed = 921600

lib_deps = 
    links2004/WebSockets @ ^2.4.1
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^6.21.3

build_flags = 
    -D WIFI_SSID=\"KNIGHT\"
    -D WIFI_PASSWORD=\"192837abcd\"

; สำหรับ Flash ESP8266
; monitor_filters = esp8266_exception_decoder
